<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectOS - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
    * { font-family: "Inter", sans-serif; }
    .glow {
      position: absolute;
      border-radius: 9999px;
      filter: blur(40px);
      opacity: .4;
      pointer-events: none;
    }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, .15); }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 relative overflow-hidden">
  <div class="glow w-80 h-80 bg-blue-400 top-[-60px] left-[-40px]"></div>
  <div class="glow w-96 h-96 bg-violet-500 bottom-[-100px] right-[-80px]"></div>

  <main class="min-h-screen flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-5 items-stretch">
      <section class="rounded-3xl border border-white/10 bg-white/5 backdrop-blur-md p-7 md:p-9">
        <p class="text-xs font-semibold tracking-wider uppercase text-blue-200">ProjectOS / AI Decision OS</p>
        <h1 class="text-3xl md:text-4xl font-extrabold mt-3 leading-tight">讓每個決策<br>都能被快速執行</h1>
        <p class="text-sm text-slate-300 mt-4 leading-relaxed">登入後可直接進入 Dashboard、建立新專案，並在 Task 追蹤中即時檢視風險與進度。</p>

        <div class="grid grid-cols-2 gap-3 mt-7">
          <div class="bg-white/10 border border-white/10 rounded-2xl p-4">
            <p class="text-xs text-slate-300">本週待追蹤</p>
            <p class="text-2xl font-extrabold mt-1">12</p>
          </div>
          <div class="bg-white/10 border border-white/10 rounded-2xl p-4">
            <p class="text-xs text-slate-300">風險任務</p>
            <p class="text-2xl font-extrabold mt-1 text-orange-300">3</p>
          </div>
        </div>
      </section>

      <section class="rounded-3xl border border-slate-200 bg-white p-7 md:p-9 text-slate-800 shadow-2xl">
        <div class="flex items-center justify-between mb-5">
          <p class="text-xs font-semibold text-blue-600 bg-blue-50 border border-blue-200 px-2.5 py-1 rounded-full">版本 C</p>
          <a href="dashboard.html" class="text-xs text-slate-500 hover:text-blue-600">返回 Dashboard</a>
        </div>

        <h2 class="text-2xl font-extrabold text-slate-900">帳號登入</h2>
        <p class="text-sm text-slate-500 mt-1">請輸入公司帳號與密碼，開始你的工作流程。</p>

        <form class="space-y-4 mt-6">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">帳號</label>
            <input type="text" placeholder="Account or Email" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:border-blue-400 transition">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">密碼</label>
            <input type="password" placeholder="Password" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:border-blue-400 transition">
          </div>
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-slate-600">
              <input type="checkbox" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
              自動登入
            </label>
            <a href="#" class="text-blue-600 hover:text-blue-700">忘記密碼</a>
          </div>

          <button type="button" class="w-full bg-gradient-to-r from-blue-600 to-violet-600 hover:from-blue-700 hover:to-violet-700 text-white py-2.5 rounded-xl font-bold text-sm transition">登入 ProjectOS</button>
          <button type="button" class="w-full border border-slate-200 hover:bg-slate-50 text-slate-700 py-2.5 rounded-xl font-medium text-sm transition">使用企業 SSO</button>
        </form>
      </section>
    </div>
  </main>
</body>
</html>
